<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全球難民分布地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ── Base ── */
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #map { height: 100vh; width: 100%; }

        /* ── Shared: Legend items ── */
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        .legend-item span { margin-left: 2px; }

        /* ── Desktop legend (Leaflet control) ── */
        .legend {
            background: white;
            padding: 10px 14px;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            line-height: 1.5;
            max-width: 250px;
        }
        .legend h4 { margin: 0 0 6px 0; font-size: 12px; font-weight: 600; }

        /* ── Intro overlay ── */
        #intro-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.65);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #intro-box {
            background: white;
            padding: 32px 28px;
            border-radius: 12px;
            width: 100%;
            max-width: 460px;
            text-align: center;
            font-family: 'DM Sans', sans-serif;
        }
        #intro-box h1 {
            margin: 0 0 14px 0;
            font-size: clamp(20px, 5vw, 26px);
            color: #ee0000;
            line-height: 1.2;
        }
        #intro-box p {
            color: #444;
            line-height: 1.6;
            margin-bottom: 10px;
            font-size: clamp(13px, 3.5vw, 15px);
        }
        #intro-btn {
            margin-top: 18px;
            padding: 13px 32px;
            background: #ee0000;
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: clamp(14px, 4vw, 16px);
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            max-width: 280px;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        #intro-btn:hover, #intro-btn:active { background: #ee0000; }

        /* ── Mobile: Bottom sheet ── */
        #mobile-sheet {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: white;
            border-radius: 16px 16px 0 0;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
            z-index: 1500;
            padding: 0 20px 32px;
            font-family: 'DM Sans', sans-serif;
            max-height: 70vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        #mobile-sheet.open { transform: translateY(0); }
        #sheet-handle {
            width: 40px;
            height: 4px;
            background: #ddd;
            border-radius: 2px;
            margin: 12px auto 16px;
        }
        #sheet-close {
            position: absolute;
            top: 16px; right: 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 50%;
            width: 28px; height: 28px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        #sheet-content h3     { margin: 0 0 6px; font-size: 18px; color: #222; }
        #sheet-content .refugee-count { font-size: 13px; color: #666; margin-bottom: 12px; }
        #sheet-content img    { width: 100%; border-radius: 8px; margin-bottom: 12px; display: block; }
        #sheet-content a {
            display: block;
            text-align: center;
            background: #ee0000;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        /* ── Mobile: Floating buttons ── */
        #legend-toggle, #layer-toggle-btn {
            display: none;
            position: fixed;
            z-index: 1000;
            background: white;
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            font-family: 'DM Sans', sans-serif;
        }
        #legend-toggle {
            bottom: 20px; right: 16px;
            border-radius: 50%;
            width: 44px; height: 44px;
            font-size: 18px;
            align-items: center;
            justify-content: center;
        }
        #layer-toggle-btn {
            top: 16px; right: 16px;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 500;
            gap: 6px;
            align-items: center;
        }

        /* ── Mobile: Floating panels ── */
        #legend-panel, #layer-drawer {
            display: none;
            position: fixed;
            z-index: 1000;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            font-family: 'DM Sans', sans-serif;
        }
        #legend-panel {
            bottom: 72px; right: 16px;
            padding: 12px 14px;
            font-size: 11px;
            max-width: 200px;
        }
        #legend-panel h4         { margin: 0 0 6px; font-size: 12px; font-weight: 600; }
        #legend-panel .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        #layer-drawer {
            top: 56px; right: 16px;
            padding: 10px 14px;
            font-size: 13px;
            min-width: 200px;
        }
        #layer-drawer h4 {
            margin: 0 0 8px;
            font-size: 12px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .layer-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 7px 0;
            border-bottom: 1px solid #f0f0f0;
            gap: 12px;
        }
        .layer-row:last-child { border-bottom: none; }
        .layer-row label { font-size: 13px; color: #333; cursor: pointer; flex: 1; }

        /* Toggle switch */
        .toggle-switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #ccc;
            border-radius: 20px;
            transition: 0.2s;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.2s;
        }
        input:checked + .toggle-slider { background: #EE0000; }
        input:checked + .toggle-slider:before { transform: translateX(16px); }

        /* ── Pulse animation (major crises) ── */
        .pulse-icon-container { position: relative; width: 100%; height: 100%; }
        .pulse-core {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background-color: #ff6a00b5;
            border: 2px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(0,0,0,0.3);
            z-index: 2;
        }
        .pulse-ring {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid #FF6B00;
            background-color: rgba(255, 107, 0, 0.2);
            border-radius: 50%;
            animation: map-ripple 2s cubic-bezier(0.25, 0, 0, 1) infinite;
            z-index: 1;
            pointer-events: none;
        }
        @keyframes map-ripple {
            0%   { transform: translate(-50%, -50%) scale(0.9); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .leaflet-control-layers,
            .leaflet-control.legend { display: none !important; }
            #legend-toggle, #layer-toggle-btn { display: flex; }
        }
        @media (min-width: 641px) {
            #legend-panel, #legend-toggle,
            #layer-toggle-btn, #layer-drawer { display: none !important; }
        }
    </style>
</head>
<body>

    <!-- Intro overlay -->
    <div id="intro-overlay">
        <div id="intro-box">
            <h1>全球難民分布地圖</h1>
            <p>本地圖顯示全球難民分布、數量統計，及無國界醫生的行動地點。</p>
            <p>橘色圓圈標示主要難民來源地，點擊可了解更多資訊。</p>
            <p>使用右上角的圖層按鈕可切換顯示所有國家的難民數量。</p>
            <p style="font-size:11px;color:#888;margin-top:14px;">數據來源：UNHCR Global Trends Report 2025 & MSF 2024 國際活動報告</p>
            <button id="intro-btn" onclick="closeIntro()">探索地圖</button>
        </div>
    </div>

    <!-- Mobile bottom sheet -->
    <div id="mobile-sheet">
        <div id="sheet-handle"></div>
        <button id="sheet-close" onclick="closeSheet()">✕</button>
        <div id="sheet-content"></div>
    </div>

    <!-- Mobile floating controls -->
    <button id="legend-toggle" onclick="toggleLegend()">🗺</button>
    <div id="legend-panel"></div>
    <button id="layer-toggle-btn" onclick="toggleLayerDrawer()">⊞ 切換圖層</button>
    <div id="layer-drawer">
        <h4>地圖圖層</h4>
        <div class="layer-row">
            <label for="toggle-all">所有國家</label>
            <label class="toggle-switch">
                <input type="checkbox" id="toggle-all" checked onchange="toggleLayer('all', this.checked)">
                <span class="toggle-slider"></span>
            </label>
        </div>
        <div class="layer-row">
            <label for="toggle-msf">無國界醫生行動地點</label>
            <label class="toggle-switch">
                <input type="checkbox" id="toggle-msf" checked onchange="toggleLayer('msf', this.checked)">
                <span class="toggle-slider"></span>
            </label>
        </div>
        <div class="layer-row">
            <label for="toggle-majors">主要難民來源地</label>
            <label class="toggle-switch">
                <input type="checkbox" id="toggle-majors" checked onchange="toggleLayer('majors', this.checked)">
                <span class="toggle-slider"></span>
            </label>
        </div>
        <div class="layer-row">
            <label for="toggle-bubbles">所有難民來源地</label>
            <label class="toggle-switch">
                <input type="checkbox" id="toggle-bubbles" onchange="toggleLayer('bubbles', this.checked)">
                <span class="toggle-slider"></span>
            </label>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>

        // ── Utilities ──────────────────────────────────────────────────────────

        const isMobile = () => window.innerWidth <= 640;

        const countryTranslator = new Intl.DisplayNames(['zh-Hant'], { type: 'region' });

        function getLocalizedName(isoCode, fallback) {
            if (!isoCode) return fallback;
            try { return countryTranslator.of(isoCode); }
            catch (e) { return fallback; }
        }

        // ── Constants ──────────────────────────────────────────────────────────

        const MAX_BUBBLE_RADIUS = 35;
        const MIN_BUBBLE_RADIUS = 4;
        const MAX_SVG_SIZE      = 100;
        const BASE_ZOOM         = isMobile() ? 2 : 3;
        const MAX_ZOOM          = 6;

        const DATA_URLS = {
            geo:      'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson',
            refugees: 'https://raw.githubusercontent.com/11rabigan/MSF/refs/heads/main/Refugees_by_Country_2025.geojson',
        };

        const MAP_STYLES = {
            all: { fillColor: '#cccccc', color: '#878787', weight: 1, fillOpacity: 0.3, opacity: 0.5 },
            msf: { fillColor: '#EE0000', color: '#EE0000', weight: 1, fillOpacity: 0.5, opacity: 0.5 },
        };

        const MSF_COUNTRIES = [
            "Armenia", "Bangladesh", "Afghanistan", "Belgium", "Benin",
            "Brazil", "Bulgaria", "Burkina Faso", "Burundi", "Central African Republic",
            "Cameroon", "Colombia", "Chad", "Comoros", "Costa Rica",
            "Egypt", "Democratic Republic of the Congo", "Ethiopia", "France", "Greece",
            "Guatemala", "Guinea", "Honduras", "Hong Kong S.A.R.", "India",
            "Haiti", "Indonesia", "Iran", "Iraq", "Italy",
            "Ivory Coast", "Jordan", "Kazakhstan", "Kenya", "Kiribati",
            "Kyrgyzstan", "Liberia", "Lebanon", "Libya", "Madagascar",
            "Malawi", "Malaysia", "Mali", "Mauritania", "Mexico",
            "Mozambique", "Nigeria", "Niger", "Myanmar", "Pakistan",
            "Palestine", "Panama", "Papua New Guinea", "Philippines", "Poland",
            "Republic of Serbia", "Russia", "Sierra Leone", "South Sudan", "Somalia",
            "South Africa", "Tajikistan", "Sudan", "Syria", "Thailand",
            "Uganda", "Ukraine", "United Kingdom", "United Republic of Tanzania",
            "Uzbekistan", "Venezuela", "Zambia", "Zimbabwe", "Yemen", "eSwatini",
        ];

        const MAJOR_COUNTRIES = ["Syria", "Afghanistan", "Ukraine", "South Sudan", "Sudan", "Myanmar"];

        const COUNTRY_IMAGES = {
            "Syria":       "https://raw.githubusercontent.com/11rabigan/MSF/refs/heads/main/Images/MSB159566_Small.jpg",
            "Afghanistan": "https://raw.githubusercontent.com/11rabigan/MSF/refs/heads/main/Images/MSB246012_Small.jpg",
            "Ukraine":     "https://raw.githubusercontent.com/11rabigan/MSF/refs/heads/main/Images/MSB120565_Small.jpg",
            "South Sudan": "https://raw.githubusercontent.com/11rabigan/MSF/refs/heads/main/Images/MSB195709_Small.jpg",
            "Sudan":       "https://raw.githubusercontent.com/11rabigan/MSF/refs/heads/main/Images/MSB255683_Small.jpg",
            "Myanmar":     "https://raw.githubusercontent.com/11rabigan/MSF/refs/heads/main/Images/MSB240025_Small.jpg",
        };

        const COUNTRY_LINKS = {
            "Syria":       "https://www.msf.org.tw/news/syria-hasakah-humanitarian-crisis",
            "Afghanistan": "https://www.msf.org.tw/news/pakistan-forced-deportation-afghan-refugees-winter-health-crisis",
            "Ukraine":     "https://www.msf.org/ukraine",
            "South Sudan": "https://www.msf.org.tw/news/sudan-children-deadly-risk-measles-and-malnutrition",
            "Sudan":       "https://www.msf.org.tw/news/sudan-war-3-years-largest-humanitarian-crisis-14-million-displaced",
            "Myanmar":     "https://www.msf.org.tw/news/bangladesh-spike-in-arrivals-of-rohingya-refugee",
        };

        // ── Map setup ──────────────────────────────────────────────────────────

        const map = L.map('map', {
            zoomSnap: 0.5,
            minZoom: 2,
            maxZoom: MAX_ZOOM,
            tap: true,
            tapTolerance: 15,
        }).setView([30, 45], BASE_ZOOM);

        const baseMap = L.tileLayer(
            'https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',
            {
                attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a> &copy; <a href="https://carto.com">CARTO</a> | 難民數據：UNHCR Global Report 2025 | 行動地點：MSF 2024 國際活動報告',
                maxZoom: MAX_ZOOM,
            }
        ).addTo(map);

        const layers = {};
        let legendControl = null;

        // ── UI controls ────────────────────────────────────────────────────────

        function closeIntro() {
            document.getElementById('intro-overlay').style.display = 'none';
            if (!isMobile() && legendControl) legendControl.addTo(map);
            if (isMobile() && window._buildMobileLegend) window._buildMobileLegend();
        }

        function toggleLegend() {
            const panel = document.getElementById('legend-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function toggleLayerDrawer() {
            const drawer = document.getElementById('layer-drawer');
            drawer.style.display = drawer.style.display === 'block' ? 'none' : 'block';
        }

        function toggleLayer(name, visible) {
            if (!layers[name]) return;
            visible ? map.addLayer(layers[name]) : map.removeLayer(layers[name]);
        }

        function openSheet(country, count, imgUrl, linkUrl) {
            document.getElementById('sheet-content').innerHTML = `
                <h3>${country}</h3>
                <p class="refugee-count">難民人數: ${count.toLocaleString()} 人</p>
                <img src="${imgUrl}" alt="${country}" />
                <a href="${linkUrl}" target="_blank">了解更多無國界醫生的工作</a>
            `;
            const sheet = document.getElementById('mobile-sheet');
            sheet.style.display = 'block';
            requestAnimationFrame(() => sheet.classList.add('open'));
        }

        function closeSheet() {
            const sheet = document.getElementById('mobile-sheet');
            sheet.classList.remove('open');
            setTimeout(() => sheet.style.display = 'none', 300);
        }

        // Close floating panels when tapping the map
        document.getElementById('map').addEventListener('click', () => {
            document.getElementById('layer-drawer').style.display = 'none';
            document.getElementById('legend-panel').style.display  = 'none';
        });

        // ── Data loading & layer rendering ─────────────────────────────────────

        Promise.all([
            fetch(DATA_URLS.geo).then(r => r.json()),
            fetch(DATA_URLS.refugees).then(r => r.json()),
        ])
        .then(([geoData, refugeeData]) => {

            // Country fill layers
            layers.all = L.geoJSON(geoData, { style: () => MAP_STYLES.all }).addTo(map);
            layers.msf = L.geoJSON(geoData, {
                filter: f => MSF_COUNTRIES.includes(f.properties.name),
                style:  () => MAP_STYLES.msf,
            }).addTo(map);

            // Bubble sizing helper
            const maxRefugees   = Math.max(...refugeeData.features.map(f => f.properties.Refugees));
            const getBubbleRadius = count =>
                Math.max(MIN_BUBBLE_RADIUS, Math.sqrt(count / maxRefugees) * MAX_BUBBLE_RADIUS);

            // Marker layers
            layers.majors  = L.layerGroup().addTo(map);
            layers.bubbles = L.layerGroup();

            refugeeData.features.forEach(f => {
                const count = f.properties.Refugees;
                if (count <= 0) return;

                const [lng, lat]  = f.geometry.coordinates;
                const name        = f.properties.Country_Name;
                const localName   = getLocalizedName(f.properties.ISO3166_1_Alpha_2, name);

                if (MAJOR_COUNTRIES.includes(name)) {
                    // Major crisis → pulse marker
                    const coreSize = getBubbleRadius(count) * 2;
                    const icon = L.divIcon({
                        html: `
                            <div class="pulse-icon-container">
                                <div class="pulse-ring" style="width:${coreSize}px;height:${coreSize}px;"></div>
                                <div class="pulse-core" style="width:${coreSize}px;height:${coreSize}px;"></div>
                            </div>`,
                        className:  '',
                        iconSize:   [coreSize, coreSize],
                        iconAnchor: [coreSize / 2, coreSize / 2],
                    });

                    const marker = L.marker([lat, lng], { icon });

                    if (isMobile()) {
                        marker.on('click', () =>
                            openSheet(localName, count, COUNTRY_IMAGES[name], COUNTRY_LINKS[name])
                        );
                    } else {
                        marker.bindPopup(`
                            <b style="font-size:14px;">${localName}</b><br>
                            難民人數: <span style="color:#EE0000;font-weight:bold;">${count.toLocaleString()}</span> 人<br>
                            <img src="${COUNTRY_IMAGES[name]}" width="100%" style="border-radius:4px;margin-top:6px;display:block;"/><br>
                            <a href="${COUNTRY_LINKS[name]}" target="_blank"
                               style="color:#EE0000;font-weight:600;text-decoration:none;">
                                了解更多無國界醫生在此地區的工作
                            </a>
                        `);
                    }

                    marker.addTo(layers.majors);

                } else {
                    // Minor origin → simple circle
                    L.circleMarker([lat, lng], {
                        radius: getBubbleRadius(count),
                        fillColor: '#A03339', color: '#A03339',
                        weight: 1, fillOpacity: 0.5,
                    })
                .bindTooltip(`<b class="notranslate">${localName}</b><br>難民人數: ${count.toLocaleString()} 人`)                    .addTo(layers.bubbles);
                }
            });

            // ── Legend ─────────────────────────────────────────────────────────

            function buildLegendHTML() {
                const tiers = [
                    { label: '五百萬以上', count: 5000000 },
                    { label: '一百萬',     count: 1000000 },
                    { label: '二十五萬',   count: 250000  },
                    { label: '五萬',       count: 50000   },
                ];

                const tierSVG = ({ count, label }) => {
                    const r = getBubbleRadius(count);
                    const d = r * 2;
                    return `
                        <div class="legend-item">
                            <svg width="${MAX_SVG_SIZE}" height="${d + 2}" style="flex-shrink:0">
                                <circle cx="${MAX_SVG_SIZE / 2}" cy="${r + 1}" r="${r}"
                                    fill="#A03339" fill-opacity="0.5" stroke="#A03339" stroke-width="1"/>
                            </svg>
                            <span>${label}</span>
                        </div>
                        <hr style="border:none;border-top:1px solid #eee;margin:6px 0;">`;
                };

                return `
                    <h4>各來源地難民數量</h4>
                    ${tiers.map(tierSVG).join('')}
                    <div class="legend-item">
                        <svg width="${MAX_SVG_SIZE}" height="24" style="flex-shrink:0">
                            <circle cx="${MAX_SVG_SIZE / 2}" cy="12" r="10"
                                fill="#FF6B00" fill-opacity="0.5" stroke="#FF6B00" stroke-width="2"/>
                        </svg>
                        <span>主要難民來源地</span>
                    </div>
                    <hr style="border:none;border-top:1px solid #eee;margin:6px 0;">
                    <h4 style="margin:0 0 6px 0;">無國界醫生行動地點</h4>
                    <div class="legend-item">
                        <svg width="${MAX_SVG_SIZE}" height="20" style="flex-shrink:0">
                            <rect x="${MAX_SVG_SIZE / 2 - 9}" y="4" width="18" height="12"
                                fill="#EE0000" fill-opacity="0.5" stroke="#EE0000" stroke-width="1"/>
                        </svg>
                        <span>無國界醫生行動地點</span>
                    </div>`;
            }

            legendControl = L.control({ position: 'bottomright' });
            legendControl.onAdd = function () {
                const div = L.DomUtil.create('div', 'legend');
                div.innerHTML = buildLegendHTML();
                return div;
            };

            window._buildMobileLegend = () => {
                document.getElementById('legend-panel').innerHTML = buildLegendHTML();
            };

            // Desktop layer control
            L.control.layers(
                { "底圖 - Carto Light": baseMap },
                {
                    "所有國家":          layers.all,
                    "無國界醫生行動地點": layers.msf,
                    "主要難民來源地":     layers.majors,
                    "所有難民來源地":     layers.bubbles,
                }
            ).addTo(map);
        })
        .catch(err => console.error("Failed to load data:", err));

    </script>
